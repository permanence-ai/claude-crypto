name: CI (Full)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Full build and test matrix (macOS).
  #
  # 6 provider/PQC configurations × 2 build types = 12 jobs.
  # IA_ASM is excluded here: it runs on a native x86-64 Linux runner (see below).
  # ---------------------------------------------------------------------------
  build-test:
    name: ${{ matrix.config.provider }}-${{ matrix.config.pqc }} / ${{ matrix.build_type }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        config:
          - { provider: PSA_MBEDTLS, pqc: NONE   }
          - { provider: PSA_MBEDTLS, pqc: LIBOQS }
          - { provider: ARM_ASM,     pqc: NONE   }
          - { provider: ARM_ASM,     pqc: LIBOQS }
          - { provider: OPENSSL,     pqc: NONE   }
          - { provider: OPENSSL,     pqc: LIBOQS }
        build_type: [Debug, Sanitize]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.config.provider }}-${{ matrix.config.pqc }}-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.config.provider }}-${{ matrix.config.pqc }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.config.provider }} \
            -DSAFE_CRYPTO_PQC=${{ matrix.config.pqc }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # IA_ASM build and test on native x86-64 Linux.
  #
  # GitHub's ubuntu-latest runners are x86-64, so IA_ASM runs natively without
  # cross-compilation. SHA-NI availability is not guaranteed on all Azure VM
  # generations, so we probe /proc/cpuinfo and skip tests if SHA-NI is absent
  # rather than letting them SIGILL. The build always runs to verify compilation.
  # ---------------------------------------------------------------------------
  build-test-ia-asm:
    name: IA_ASM-NONE / ${{ matrix.build_type }} (Linux x86-64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Sanitize]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libssl-dev python3-jsonschema python3-jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-linux-IA_ASM-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-linux-IA_ASM-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=IA_ASM \
            -DSAFE_CRYPTO_PQC=NONE \
            -DSAFE_CRYPTO_IA_ASM_SHA_NI=OFF \
            -DSAFE_CRYPTO_IA_ASM_AES_NI=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Clang-tidy lint — per-provider matrix
  #
  # Each provider is built with its own compile_commands.json so that
  # provider-internal includes (defs.hpp, openssl/bn.h, oqs/oqs.h, …) resolve
  # correctly.  Each job lints only the headers that belong to its provider,
  # plus safe-crypto-lib/ (linted under PSA_MBEDTLS which pulls in mbedtls
  # and PSA headers that safe-crypto-lib uses).
  #
  # IA_ASM cross-compiles to x86_64 on macOS so SHA-NI / AES-NI intrinsics
  # are available during tidy.
  #
  # Uses Homebrew llvm for a pinned clang-tidy version.
  # ---------------------------------------------------------------------------
  lint:
    name: clang-tidy / ${{ matrix.label }}
    runs-on: macos-15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: PSA_MBEDTLS
            provider: PSA_MBEDTLS
            pqc: NONE
            cmake_extra: ""
            header_filter: "safe-crypto-lib/|providers/psa_mbedtls/"
          - label: ARM_ASM
            provider: ARM_ASM
            pqc: NONE
            cmake_extra: ""
            header_filter: "providers/arm_asm/"
          - label: OPENSSL
            provider: OPENSSL
            pqc: NONE
            cmake_extra: ""
            header_filter: "providers/openssl/"
          - label: IA_ASM
            provider: IA_ASM
            pqc: NONE
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            header_filter: "providers/ia_asm/"
          - label: LIBOQS
            provider: ARM_ASM
            pqc: LIBOQS
            cmake_extra: ""
            header_filter: "providers/liboqs/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-llvm-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3 llvm
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-lint-${{ matrix.label }}/_deps
          key: fetchcontent-lint-${{ matrix.label }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-lint-${{ matrix.label }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build-lint-${{ matrix.label }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=${{ matrix.pqc }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ matrix.cmake_extra }}

      - name: Run clang-tidy
        # Run clang-tidy via the compile_commands.json entry points (.cpp files)
        # so that each header is analysed with the correct -I / -std flags.
        # --header-filter restricts output to the provider headers under review.
        run: |
          jq -r '.[].file' build-lint-${{ matrix.label }}/compile_commands.json \
            | grep -v '_deps' \
            | xargs "$(brew --prefix llvm)/bin/clang-tidy" \
                -p build-lint-${{ matrix.label }} \
                "--header-filter=${{ matrix.header_filter }}"

  # ---------------------------------------------------------------------------
  # Coverage
  #
  # LLVM source-based coverage scoped to safe-crypto-lib/ headers.
  # Run against PSA_MBEDTLS, ARM_ASM, and OPENSSL providers (3 jobs).
  # IA_ASM is excluded: it cross-compiles to x86_64 and cannot run under Rosetta.
  # PQC=NONE for PSA and ARM (no real implementation); PQC=LIBOQS for OpenSSL
  # so that pqc_dsa.hpp / pqc_kem.hpp are exercised.
  # ---------------------------------------------------------------------------
  coverage:
    name: coverage / ${{ matrix.provider }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - provider: PSA_MBEDTLS
            pqc: NONE
          - provider: ARM_ASM
            pqc: NONE
          - provider: OPENSSL
            pqc: LIBOQS

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-llvm-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3 llvm
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-cov/_deps
          key: fetchcontent-cov-${{ matrix.provider }}-${{ matrix.pqc }}-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-cov-${{ matrix.provider }}-${{ matrix.pqc }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build-cov \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=${{ matrix.pqc }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_CXX_FLAGS="-fprofile-instr-generate -fcoverage-mapping" \
            -DCMAKE_EXE_LINKER_FLAGS="-fprofile-instr-generate"

      - name: Build
        run: cmake --build build-cov

      - name: Test
        run: |
          LLVM_PROFILE_FILE="${{ github.workspace }}/build-cov/coverage-%p.profraw" \
            ctest --test-dir build-cov --output-on-failure

      - name: Merge profiles
        run: |
          "$(brew --prefix llvm)/bin/llvm-profdata" merge \
            -sparse "${{ github.workspace }}"/build-cov/coverage-*.profraw \
            -o build-cov/coverage.profdata

      - name: Report (terminal summary)
        run: |
          "$(brew --prefix llvm)/bin/llvm-cov" report \
            build-cov/safe-crypto-lib-test/safe_crypto_lib_test \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(_deps|safe-crypto-lib-test|safe-crypto-lib-bench|providers)' \
            2>&1 | tee build-cov/coverage-summary.txt

      - name: Generate HTML report
        run: |
          "$(brew --prefix llvm)/bin/llvm-cov" show \
            build-cov/safe-crypto-lib-test/safe_crypto_lib_test \
            -instr-profile=build-cov/coverage.profdata \
            -ignore-filename-regex='(_deps|safe-crypto-lib-test|safe-crypto-lib-bench|providers)' \
            -format=html \
            -output-dir=build-cov/coverage-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.provider }}-${{ matrix.pqc }}
          path: |
            build-cov/coverage-summary.txt
            build-cov/coverage-html/

  # ---------------------------------------------------------------------------
  # ThreadSanitizer — ARM_ASM provider, full test suite.
  # Catches data races in pqc_key_store.hpp mutex paths and any other shared-
  # state code.  Mutually exclusive with ASan so this is a separate build type.
  # ---------------------------------------------------------------------------
  sanitize-tsan:
    name: TSan / ARM_ASM-NONE
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-tsan/_deps
          key: fetchcontent-tsan-ARM_ASM-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-tsan-ARM_ASM-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build-tsan \
            -DCMAKE_BUILD_TYPE=SanitizeTSan \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=ARM_ASM \
            -DSAFE_CRYPTO_PQC=NONE \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Verify sanitizer flags present
        run: grep -q "\-fsanitize=thread" build-tsan/compile_commands.json

      - name: Build
        run: cmake --build build-tsan

      - name: Test
        run: ctest --test-dir build-tsan --output-on-failure

  # ---------------------------------------------------------------------------
  # LeakSanitizer — ARM_ASM provider, requires homebrew clang (system clang on
  # macOS arm64 does not support standalone -fsanitize=leak).
  # ---------------------------------------------------------------------------
  sanitize-lsan:
    name: LSan / ARM_ASM-NONE
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-llvm-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3 llvm
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-lsan/_deps
          key: fetchcontent-lsan-ARM_ASM-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-lsan-ARM_ASM-NONE-

      - name: Configure
        run: |
          SDK=$(xcrun --show-sdk-path)
          cmake -G Ninja -B build-lsan \
            -DCMAKE_BUILD_TYPE=SanitizeLSan \
            -DCMAKE_CXX_COMPILER="$(brew --prefix llvm)/bin/clang++" \
            -DCMAKE_C_COMPILER="$(brew --prefix llvm)/bin/clang" \
            -DCMAKE_CXX_FLAGS="-isysroot ${SDK}" \
            -DCMAKE_C_FLAGS="-isysroot ${SDK}" \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=ARM_ASM \
            -DSAFE_CRYPTO_PQC=NONE \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Verify sanitizer flags present
        run: grep -q "\-fsanitize=leak" build-lsan/compile_commands.json

      - name: Build
        run: cmake --build build-lsan

      - name: Test
        run: ctest --test-dir build-lsan --output-on-failure

  # ---------------------------------------------------------------------------
  # Summary — runs after all other jobs (pass or fail) and writes a Markdown
  # report to the GitHub Actions job summary page.
  # ---------------------------------------------------------------------------
  summary:
    name: Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [build-test, build-test-ia-asm, lint, coverage, sanitize-tsan, sanitize-lsan]

    steps:
      - name: Write job summary
        env:
          BUILD_TEST_RESULT:    ${{ needs.build-test.result }}
          IA_ASM_RESULT:        ${{ needs.build-test-ia-asm.result }}
          LINT_RESULT:          ${{ needs.lint.result }}
          COVERAGE_RESULT:      ${{ needs.coverage.result }}
          TSAN_RESULT:          ${{ needs.sanitize-tsan.result }}
          LSAN_RESULT:          ${{ needs.sanitize-lsan.result }}
          RUN_URL:              ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TRIGGER:              ${{ github.event_name }}
          REF:                  ${{ github.ref_name }}
          SHA:                  ${{ github.sha }}
        run: |
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              cancelled) echo "⚪" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }

          overall="success"
          for r in "$BUILD_TEST_RESULT" "$IA_ASM_RESULT" "$COVERAGE_RESULT" "$TSAN_RESULT" "$LSAN_RESULT"; do
            [ "$r" = "success" ] || overall="failure"
          done
          [ "$overall" = "success" ] && overall_icon="✅ Passed" || overall_icon="❌ Failed"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## CI (Full) — ${overall_icon}

          | | Job | Result |
          |---|---|---|
          | $(status_icon "$BUILD_TEST_RESULT") | build-test (macOS matrix) | ${BUILD_TEST_RESULT} |
          | $(status_icon "$IA_ASM_RESULT") | build-test-ia-asm (Linux x86-64) | ${IA_ASM_RESULT} |
          | $(status_icon "$LINT_RESULT") | lint (clang-tidy, non-blocking) | ${LINT_RESULT} |
          | $(status_icon "$COVERAGE_RESULT") | coverage (PSA / ARM / OpenSSL) | ${COVERAGE_RESULT} |
          | $(status_icon "$TSAN_RESULT") | sanitize-tsan (ThreadSanitizer) | ${TSAN_RESULT} |
          | $(status_icon "$LSAN_RESULT") | sanitize-lsan (LeakSanitizer) | ${LSAN_RESULT} |

          **Trigger:** \`${TRIGGER}\` · **Ref:** \`${REF}\` · **Commit:** \`${SHA:0:8}\`

          [View full run](${RUN_URL})
          EOF
