name: CI (PR)

on:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Fast build and test subset for PR checks.
  #
  # PSA_MBEDTLS (Debug + Sanitize) and OPENSSL (Debug) — all PQC=NONE.
  # ARM_ASM is excluded here: its test suite takes too long to block PR merges.
  # It runs in ci-full.yml on every push to main.
  # IA_ASM is excluded: cross-compiled only, cannot run under Rosetta 2.
  # Full matrix (all PQC variants, all build types) runs in ci-full.yml.
  # ---------------------------------------------------------------------------
  build-test:
    name: ${{ matrix.provider }} / ${{ matrix.build_type }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { provider: PSA_MBEDTLS, build_type: Debug     }
          - { provider: PSA_MBEDTLS, build_type: Sanitize  }
          - { provider: OPENSSL,     build_type: Debug     }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.provider }}-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.provider }}-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=NONE \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ---------------------------------------------------------------------------
  # Clang-tidy lint — per-provider matrix (same as full CI).
  # ---------------------------------------------------------------------------
  lint:
    name: clang-tidy / ${{ matrix.label }}
    runs-on: macos-15
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: PSA_MBEDTLS
            provider: PSA_MBEDTLS
            pqc: NONE
            cmake_extra: ""
            tidy_paths: "safe-crypto-lib providers/psa_mbedtls"
          - label: ARM_ASM
            provider: ARM_ASM
            pqc: NONE
            cmake_extra: ""
            tidy_paths: "providers/arm_asm"
          - label: OPENSSL
            provider: OPENSSL
            pqc: NONE
            cmake_extra: ""
            tidy_paths: "providers/openssl"
          - label: IA_ASM
            provider: IA_ASM
            pqc: NONE
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            tidy_paths: "providers/ia_asm"
          - label: LIBOQS
            provider: ARM_ASM
            pqc: LIBOQS
            cmake_extra: ""
            tidy_paths: "providers/liboqs"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-llvm-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3 llvm
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-lint-${{ matrix.label }}/_deps
          key: fetchcontent-lint-${{ matrix.label }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-lint-${{ matrix.label }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build-lint-${{ matrix.label }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=${{ matrix.pqc }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ matrix.cmake_extra }}

      - name: Run clang-tidy
        run: |
          find ${{ matrix.tidy_paths }} -name '*.hpp' \
            | xargs "$(brew --prefix llvm)/bin/clang-tidy" \
                -p build-lint-${{ matrix.label }}
