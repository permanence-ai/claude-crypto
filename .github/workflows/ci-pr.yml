name: CI (PR)

on:
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Fast build and test subset for PR checks.
  #
  # PSA_MBEDTLS (Debug + Sanitize), OPENSSL (Debug), and ARM_ASM (Debug) —
  # all PQC=NONE.  ARM_ASM/Debug catches regressions in the native crypto
  # provider before they land on main; Sanitize and LIBOQS variants run in
  # ci-full.yml on every push to main.
  # IA_ASM is excluded from build-test: cross-compiled only, cannot run under
  # Rosetta 2.  A compile-check job below verifies IA_ASM still builds.
  # Full matrix (all PQC variants, all build types) runs in ci-full.yml.
  # ---------------------------------------------------------------------------
  build-test:
    name: ${{ matrix.provider }} / ${{ matrix.build_type }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - { provider: PSA_MBEDTLS, build_type: Debug     }
          - { provider: PSA_MBEDTLS, build_type: Sanitize  }
          - { provider: OPENSSL,     build_type: Debug     }
          - { provider: ARM_ASM,     build_type: Debug     }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-${{ matrix.provider }}-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ matrix.provider }}-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=NONE \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Verify CLI tests ran
        run: ctest --test-dir build --output-on-failure --no-tests=error -R "^CLI\."

  # ---------------------------------------------------------------------------
  # IA_ASM compile-check on native x86-64 Linux.
  #
  # IA_ASM cannot run tests under Rosetta 2, but we still want to catch build
  # errors on PR.  This job compiles only — no test execution.
  # ---------------------------------------------------------------------------
  build-ia-asm:
    name: IA_ASM / Debug (Linux x86-64, compile only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake ninja-build libssl-dev python3-jsonschema python3-jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-pr-linux-IA_ASM-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-pr-linux-IA_ASM-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=IA_ASM \
            -DSAFE_CRYPTO_PQC=NONE \
            -DSAFE_CRYPTO_IA_ASM_SHA_NI=OFF \
            -DSAFE_CRYPTO_IA_ASM_AES_NI=OFF \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build

  # ---------------------------------------------------------------------------
  # Clang-tidy lint — per-provider matrix (same as full CI).
  # Blocking: lint failures prevent PR merge.
  # ---------------------------------------------------------------------------
  lint:
    name: clang-tidy / ${{ matrix.label }}
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: PSA_MBEDTLS
            provider: PSA_MBEDTLS
            pqc: NONE
            cmake_extra: ""
            header_filter: "safe-crypto-lib/|providers/psa_mbedtls/"
          - label: ARM_ASM
            provider: ARM_ASM
            pqc: NONE
            cmake_extra: ""
            header_filter: "providers/arm_asm/"
          - label: OPENSSL
            provider: OPENSSL
            pqc: NONE
            cmake_extra: ""
            header_filter: "providers/openssl/"
          - label: IA_ASM
            provider: IA_ASM
            pqc: NONE
            cmake_extra: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            header_filter: "providers/ia_asm/"
          - label: LIBOQS
            provider: ARM_ASM
            pqc: LIBOQS
            cmake_extra: ""
            header_filter: "providers/liboqs/"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-llvm-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3 llvm
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-lint-${{ matrix.label }}/_deps
          key: fetchcontent-lint-${{ matrix.label }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: fetchcontent-lint-${{ matrix.label }}-

      - name: Configure
        run: |
          cmake -G Ninja -B build-lint-${{ matrix.label }} \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=${{ matrix.provider }} \
            -DSAFE_CRYPTO_PQC=${{ matrix.pqc }} \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            ${{ matrix.cmake_extra }}

      - name: Run clang-tidy
        # Use safe-crypto-lib-test/main.cpp as the sole translation unit — it
        # transitively includes all provider headers with the correct flags.
        # --header-filter then restricts diagnostics to the target provider scope.
        # Excluding cli/main.cpp and bench_main.cpp avoids spurious diagnostics
        # from those entry points (--header-filter only affects included headers,
        # not primary translation units passed on the command line).
        run: |
          SDK=$(xcrun --show-sdk-path)
          jq -r '.[].file' build-lint-${{ matrix.label }}/compile_commands.json \
            | grep 'safe-crypto-lib-test/main\.cpp$' \
            | xargs "$(brew --prefix llvm)/bin/clang-tidy" \
                -p build-lint-${{ matrix.label }} \
                "--header-filter=${{ matrix.header_filter }}" \
                "--extra-arg=-isysroot${SDK}"

  # ---------------------------------------------------------------------------
  # ThreadSanitizer — PSA_MBEDTLS for a fast PR-gate check.
  # Full TSan (ARM_ASM) runs in ci-full.yml on main.
  # ---------------------------------------------------------------------------
  sanitize-tsan:
    name: TSan / PSA_MBEDTLS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-cmake-ninja-openssl3-${{ runner.os }}

      - name: Install toolchain
        run: |
          brew install cmake ninja openssl@3
          pip3 install --break-system-packages jsonschema jinja2

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: build-tsan/_deps
          key: fetchcontent-tsan-PSA_MBEDTLS-NONE-${{ hashFiles('CMakeLists.txt', 'providers/**/CMakeLists.txt') }}
          restore-keys: fetchcontent-tsan-PSA_MBEDTLS-NONE-

      - name: Configure
        run: |
          cmake -G Ninja -B build-tsan \
            -DCMAKE_BUILD_TYPE=SanitizeTSan \
            -DSAFE_CRYPTO_ACTIVE_PROVIDER=PSA_MBEDTLS \
            -DSAFE_CRYPTO_PQC=NONE \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Build
        run: cmake --build build-tsan

      - name: Test
        run: ctest --test-dir build-tsan --output-on-failure
